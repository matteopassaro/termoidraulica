kind = "web"
previewPath = "/"
title = "Termoidraulica Bari"
version = "1.0.0"
id = "artifacts/termoidraulica-bari"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21232

[services.development]
run = "pnpm --filter @workspace/termoidraulica-bari run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/termoidraulica-bari", "run", "build" ]
publicDir = "artifacts/termoidraulica-bari/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21232"
BASE_PATH = "/"
